<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Polymarket × Casino — Java Desktop App</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="screens-market.jsx"></script>
  <script type="text/babel" src="screens-funnel.jsx"></script>

  <script type="text/babel">
    const W = 1280;
    const H = 800;

    // Tweaks defaults: pinned at component-name level so users can flip
    // any single artboard's content without re-rendering.
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "otoVariant": "hard",
      "wheelLanded": "10×",
      "slotState": 1
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      const OTOActive = { soft: OTOSoft, medium: OTOMedium, hard: OTOHard }[t.otoVariant];

      return (
        <div className="app" style={{height: '100%'}}>
          <DesignCanvas>
            <DCSection id="onboarding" title="① Onboarding" subtitle="Funnel entry — first deposit. Sober trading vibe.">
              <DCArtboard id="deposit" label="Deposit · 3 of 4" width={W} height={H}>
                <Onboarding/>
              </DCArtboard>
            </DCSection>

            <DCSection id="market" title="② Market — sober trading terminal" subtitle="Polymarket-like browsing, buying, holding, creating.">
              <DCArtboard id="list" label="Markets list" width={W} height={H}>
                <MarketsList/>
              </DCArtboard>
              <DCArtboard id="detail" label="Market detail · YES/NO + order book" width={W} height={H}>
                <MarketDetail/>
              </DCArtboard>
              <DCArtboard id="portfolio" label="Portfolio · open positions" width={W} height={H}>
                <Portfolio/>
              </DCArtboard>
              <DCArtboard id="create" label="Create market" width={W} height={H}>
                <CreateMarket/>
              </DCArtboard>
              <DCArtboard id="resolved" label="Resolution · YES win" width={W} height={H}>
                <ResolutionWin/>
              </DCArtboard>
            </DCSection>

            <DCSection id="funnel" title="③ The funnel — OTO at claim time" subtitle="Three direct-response variants. Toggle aggressiveness in Tweaks.">
              <DCArtboard id="oto-soft" label="OTO · Soft (premium, opt-in)" width={W} height={H}>
                <OTOSoft/>
              </DCArtboard>
              <DCArtboard id="oto-medium" label="OTO · Medium (countdown + odds)" width={W} height={H}>
                <OTOMedium/>
              </DCArtboard>
              <DCArtboard id="oto-hard" label="OTO · Hard (full direct response)" width={W} height={H}>
                <OTOHard/>
              </DCArtboard>
              <DCArtboard id="oto-current" label={"OTO · Currently selected: " + t.otoVariant} width={W} height={H}>
                <OTOActive/>
              </DCArtboard>
              <DCArtboard id="wheel" label="Wheel of multipliers · 2×/5×/10×" width={W} height={H}>
                <WheelScreen landed={t.wheelLanded}/>
              </DCArtboard>
            </DCSection>

            <DCSection id="casino" title="④ Casino — flashy, neon, gold" subtitle="Where credits get burned. Visual contrast with the market world.">
              <DCArtboard id="lobby" label="Casino lobby (with boost banner)" width={W} height={H}>
                <CasinoLobby/>
              </DCArtboard>
              <DCArtboard id="slot" label={"Slot machine · " + (t.slotState === 1 ? "JACKPOT" : "spinning")} width={W} height={H}>
                <SlotMachine spin={t.slotState}/>
              </DCArtboard>
              <DCArtboard id="loss" label="Loss & re-deposit (relance)" width={W} height={H}>
                <LossRelance/>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="OTO funnel">
              <TweakRadio
                label="Aggressiveness"
                value={t.otoVariant}
                options={[
                  {value: 'soft', label: 'Soft'},
                  {value: 'medium', label: 'Medium'},
                  {value: 'hard', label: 'Hard'},
                ]}
                onChange={(v) => setTweak('otoVariant', v)}
              />
            </TweakSection>
            <TweakSection title="Wheel result">
              <TweakRadio
                label="Landed on"
                value={t.wheelLanded}
                options={[
                  {value: '2×', label: '2×'},
                  {value: '5×', label: '5×'},
                  {value: '10×', label: '10×'},
                ]}
                onChange={(v) => setTweak('wheelLanded', v)}
              />
            </TweakSection>
            <TweakSection title="Slot machine">
              <TweakRadio
                label="State"
                value={String(t.slotState)}
                options={[
                  {value: '0', label: 'Idle'},
                  {value: '1', label: 'Jackpot'},
                ]}
                onChange={(v) => setTweak('slotState', Number(v))}
              />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
